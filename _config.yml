# ----
# Site

title: 101 Perguntas sobre Bitcoin
description: Guia direto para aprender Bitcoin com perguntas e respostas: fundamentos, segurança e custódia.
url: "https://bitcoin101.site"
baseurl:
lang: pt-BR
locale: pt_BR
google_analytics_key:
google_maps_javascript_api_key:
disqus_shortname:

# Values for the jekyll-seo-tag gem (https://github.com/jekyll/jekyll-seo-tag)
logo: /siteicon.png
author:
  name: Breno Brito
  email:
  twitter: brenorb # twitter username without the @ symbol
  website: https://brenorb.com/

twitter:
  username: brenorb
  card: summary_large_image

social:
  name: Breno Brito
  links:
    - https://bitcoin101.site
    - https://brenorb.com/
    - https://twitter.com/brenorb
    - https://github.com/brenorb

# -----
# Build

# timezone: Etc/UTC
timezone: America/Sao_Paulo

paginate: 10
paginate_path: "/blog/:num/"

collections:
  - "staff_members"

defaults:
  -
    scope:
      path: ""
    values:
      layout: page
      # background_image_path: /uploads/building.jpg
      background_image_path: /uploads/livro.png
      # image: /uploads/building.jpg
      image: /uploads/5.png
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post
      _options:
        content:
          width: 960
          height: 2000
      _comments:
        image: Shown in social shares and the blog list.
  -
    scope:
      path: ""
      type: "staff_members"
    values:
      _options:
        image:
          width: 440
          height: 440

permalink: pretty
mathjax:            true


jekyll-archives:
  enabled:
    - categories

plugins:
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE

# -----------
# CloudCannon

_select_data:
  call_to_actions:
    - Contact
    - Blog
    - Map

  social_icons:
    # - Facebook
    # - Instagram
    - LinkedIn
    # - Pinterest
    # - Tumblr
    - Twitter
    # - YouTube
    # - RSS

_comments:
  large_header: Toggles the size of the top banner.
  show_in_navigation: Toggles a link in the top banner.
  author_staff_member: The staff member writing this post.
  call_to_action: Type of request shown at the bottom of this page.
  background_image_path: Image shown in the top banner, blank for the default.
  testimonials: Update, add or remove testimonials.
  map: Update the map location and display settings.
  latitude: Coordinates for the center marker on the map.
  longitude: Coordinates for the center marker on the map.
  zoom: The zoom level for the map.
  phone_extension: The digits after dialing the company phone.
  credentials: Shown as subtext on staff member summaries.
  contact_email_address: Address for the contact form to send to.
  new_window: Whether the link opens a new browser tab/window.
